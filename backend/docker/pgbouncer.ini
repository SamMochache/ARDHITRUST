# docker/pgbouncer.ini
# FIX 1: PgBouncer — Connection Pooler
#
# PROBLEM SOLVED:
#   PostgreSQL default max_connections = 100.
#   With 4 Gunicorn workers × 2 threads × N servers = connections used fast.
#   At 3 web servers you'd hit the limit with ~24 connections, leaving nothing
#   for migrations, admin, Celery, etc.
#
# HOW IT WORKS:
#   PgBouncer sits between your app and PostgreSQL.
#   App opens 1000 connections to PgBouncer.
#   PgBouncer maintains only 20-50 real connections to PostgreSQL.
#   Uses "transaction" pooling — a real connection is only held during
#   the actual DB transaction, then returned to pool immediately.
#
# RESULT:
#   Supports 10,000+ concurrent app connections with only 50 real DB connections.
#   PostgreSQL never gets overwhelmed.

[databases]
ardhitrust = host=db port=5432 dbname=ardhitrust

[pgbouncer]
listen_addr          = 0.0.0.0
listen_port          = 6432
auth_type            = md5
auth_file            = /etc/pgbouncer/userlist.txt

# Transaction pooling: connection returned to pool after each transaction.
# This is safe for Django because each request uses at most one transaction.
pool_mode            = transaction

# Max real connections to PostgreSQL
server_pool_size     = 50
max_client_conn      = 10000

# Keep a minimum pool ready — avoids cold-start latency
min_pool_size        = 5
reserve_pool_size    = 10
reserve_pool_timeout = 3

# Health
server_idle_timeout  = 600
client_idle_timeout  = 300

# Logging
log_connections      = 0
log_disconnections   = 0
log_pooler_errors    = 1
stats_period         = 60

# Admin interface
admin_users          = ardhitrust