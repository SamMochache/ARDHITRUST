# .github/workflows/ci.yml
name: ArdhiTrust CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ardhitrust_test
          POSTGRES_USER: ardhitrust
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready --health-interval 10s
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }

      - run: pip install -r requirements/development.txt
      - run: ruff check .
      - run: mypy apps/ config/
      - run: bandit -r apps/ config/ -ll
      - run: pip-audit

      - name: Run tests
        env:
          DATABASE_URL: postgres://ardhitrust:testpass@localhost:5432/ardhitrust_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-only-key
          DJANGO_SETTINGS_MODULE: config.settings.test
          ARDHISASA_MOCK_MODE: "true"
          IPRS_MOCK_MODE: "true"
        run: pytest --cov=apps --cov-report=xml --cov-fail-under=80 -q

      - uses: codecov/codecov-action@v4